
<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>K2 數學練習題 - 平板版</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #dff7ff;
      --card: #ffffff;
      --ink: #2d2a32;
      --pink: #ff7fab;
      --mint: #82e9c5;
      --sky: #88c9ff;
      --sun: #ffd86b;
      --ok: #1f9d55;
      --bad: #d64545;
      --shadow: 0 8px 20px rgba(45, 42, 50, 0.12);
      --radius: 20px;
      --question-size: 1.5rem;
      --choice-size: 1.35rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #fff3b5 0, transparent 25%),
        radial-gradient(circle at 90% 20%, #c7f0ff 0, transparent 22%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      z-index: 0;
      filter: blur(2px);
      animation: floaty 7s ease-in-out infinite;
      pointer-events: none;
    }

    body::before {
      top: 18px;
      left: -40px;
      background: radial-gradient(circle, #ffd1e4 0%, #ffd1e400 70%);
    }

    body::after {
      bottom: 10px;
      right: -45px;
      background: radial-gradient(circle, #c9f5ff 0%, #c9f5ff00 70%);
      animation-delay: -2.5s;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      background: rgba(255,255,255,0.65);
      border: 3px dashed #ffc6dc;
      border-radius: 28px;
      padding: 16px 12px 28px;
      backdrop-filter: blur(2px);
      position: relative;
      z-index: 1;
    }

    .wrap::before {
      content: "🌟 🌈 🧸 🍓";
      position: absolute;
      top: -14px;
      right: 16px;
      font-size: 1.2rem;
      letter-spacing: 6px;
      opacity: 0.95;
    }

    h1 {
      margin: 8px 0 10px;
      text-align: center;
      font-size: clamp(1.7rem, 3.6vw, 2.4rem);
    }

    .subtitle {
      text-align: center;
      margin: 0 0 18px;
      font-weight: 700;
      color: #50586b;
    }

    .toolbar {
      position: sticky;
      top: 8px;
      z-index: 10;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .size-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ffffffcc;
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: var(--shadow);
      font-weight: 800;
    }
    .link-btn { background: linear-gradient(180deg, #f2ecff, #e2d6ff); }
    .picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffffcc;
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: var(--shadow);
      font-weight: 800;
    }
    .picker select {
      border-radius: 10px;
      border: 2px solid #d6e5ff;
      padding: 6px 8px;
      font-size: 1rem;
    }
    .num-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .num-cell {
      background: #fff;
      border: 2px solid #dde7ff;
      border-radius: 12px;
      padding: 10px;
      font-weight: 800;
      font-size: 1.1rem;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .size-control input[type="range"] {
      width: 170px;
      accent-color: #63a2ff;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 800;
      color: #1f2430;
      background: linear-gradient(180deg, #fff, #ffe9f2);
      box-shadow: var(--shadow), 0 2px 0 #ffffffaa inset;
      min-height: 48px;
      min-width: 120px;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px) scale(0.99); }

    .submit { background: linear-gradient(180deg, #dcffe8, #abf0ca); }
    .reset { background: linear-gradient(180deg, #fff5d8, #ffe39a); }

    .score {
      text-align: center;
      font-weight: 800;
      margin-bottom: 14px;
      font-size: 1.05rem;
    }

    .section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      margin: 14px 0;
      box-shadow: var(--shadow);
      border: 2px solid #ffe9f5;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .section:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(45, 42, 50, 0.14);
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
      padding: 8px 10px;
      border-radius: 12px;
      background: linear-gradient(120deg, #ffe3ef, #eaf8ff);
    }

    .q {
      margin: 12px 0;
      padding: 12px;
      border-radius: 16px;
      background: #fffdf6;
      border: 2px solid #f3ecff;
      transition: transform 0.18s ease;
    }

    .q:hover { transform: scale(1.005); }

    .q p {
      margin: 0 0 10px;
      font-size: var(--question-size);
      line-height: 1.45;
      font-weight: 700;
    }

    .q-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      justify-content: space-between;
    }

    .speak-btn {
      min-width: 96px;
      min-height: 44px;
      padding: 8px 12px;
      font-size: 0.95rem;
      background: linear-gradient(180deg, #eef7ff, #d8ecff);
      border: 2px solid #bddcff;
      box-shadow: none;
      flex-shrink: 0;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 8px;
    }

    .choice {
      display: block;
      border: 2px solid #dce4ff;
      border-radius: 14px;
      background: #fff;
      padding: 10px 14px;
      text-align: left;
      font-weight: 800;
      min-height: 52px;
      font-size: var(--choice-size);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .choice.symbol-choice {
      font-size: calc(var(--choice-size) + 0.3rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .clock-option {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .mini-clock {
      width: 102px;
      height: 102px;
      border: 2px solid #333;
      border-radius: 50%;
      position: relative;
      background: #fff;
      flex-shrink: 0;
    }
    .mini-clock .num {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 800;
      color: #222;
      line-height: 1;
      pointer-events: none;
    }
    .mini-clock .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
    }
    .mini-clock .hour {
      width: 4px;
      height: 30px;
      margin-left: -2px;
      background: #222;
    }
    .mini-clock .minute {
      width: 3px;
      height: 40px;
      margin-left: -1.5px;
      background: #e33;
    }
    .mini-clock .dot {
      width: 12px;
      height: 12px;
      background: #222;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .choice input { display: none; }

    .choice:has(input:checked) {
      border-color: #63a2ff;
      background: #eaf3ff;
      box-shadow: 0 0 0 2px #dbe9ff inset;
      animation: pop 0.22s ease;
    }

    .feedback {
      margin-top: 8px;
      font-weight: 800;
      min-height: 24px;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .wrap { padding: 12px 8px 20px; }
      .q p { font-size: var(--question-size); }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .num-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pop {
      0% { transform: scale(0.98); }
      100% { transform: scale(1); }
    }
  </style>
</head>

        questions: [
          { t: `1. ${iconRepeat("🍎", a1)} 有幾多個蘋果？`, a: String(a1), c: shuffle([String(a1 - 1), String(a1), String(a1 + 1)]) },
          { t: `2. ${iconRepeat("⭐", a2)} 有幾多粒星星？`, a: String(a2), c: shuffle([String(a2 - 1), String(a2), String(a2 + 1)]) },
          { t: `3. ${iconRepeat("🐟", a3)} 有幾多條魚？`, a: String(a3), c: shuffle([String(a3 - 1), String(a3), String(a3 + 1)]) },
          { t: `4. ${iconRepeat("⚽", a4)} 有幾多個波？`, a: String(a4), c: shuffle([String(Math.max(0, a4 - 1)), String(a4), String(a4 + 1)]) },
          { t: `5. ${iconRepeat("🌸", a5)} 有幾多朵花？`, a: String(a5), c: shuffle([String(a5 - 1), String(a5), String(a5 + 1)]) }
        ]
      },
      {
        title: "B. 比較多與少",
        questions: [
          { t: `6. ${iconRepeat("🐤", b6L)} vs ${iconRepeat("🐤", b6R)}，邊一邊比較多？`, a: "左邊", c: ["左邊", "右邊"] },
          { t: `7. ${iconRepeat("🐰", b7L)} vs ${iconRepeat("🐰", b7R)}，邊一邊比較少？`, a: "左邊", c: ["左邊", "右邊"] },
          { t: "8. 🍓🍓🍓 比 🍓🍓 ______。", a: "多", c: ["多", "少"] },
          { t: "9. 🚗🚗 比 🚗🚗🚗 ______。", a: "少", c: ["多", "少"] }
        ]
      },
      {
        title: "C. 簡單加法",
        questions: [
          { t: `10. ${c10a} + ${c10b} = ?`, a: String(c10), c: shuffle([String(c10 - 1), String(c10), String(c10 + 1)]) },
          { t: `11. ${c11a} + ${c11b} = ?`, a: String(c11), c: shuffle([String(c11 - 1), String(c11), String(c11 + 1)]) },
          { t: `12. ${c12a} + ${c12b} = ?`, a: String(c12), c: shuffle([String(c12 - 1), String(c12), String(c12 + 1)]) },
          { t: `13. ${c13a} + ${c13b} = ?`, a: String(c13), c: shuffle([String(c13 - 1), String(c13), String(c13 + 1)]) },
          { t: `14. 媽媽有 ${c14a} 個橙，又買多 ${c14b} 個橙，一共幾多個？`, a: String(c14), c: shuffle([String(c14 - 1), String(c14), String(c14 + 1)]) }
        ]
      },
      {
        title: "D. 簡單減法",
        questions: [
          { t: `15. ${d15a} - ${d15b} = ?`, a: String(d15), c: shuffle([String(d15 - 1), String(d15), String(d15 + 1)]) },
          { t: `16. ${d16a} - ${d16b} = ?`, a: String(d16), c: shuffle([String(d16 - 1), String(d16), String(d16 + 1)]) },
          { t: `17. ${d17a} - ${d17b} = ?`, a: String(d17), c: shuffle([String(d17 - 1), String(d17), String(d17 + 1)]) },
          { t: `18. 枱上有 ${d18a} 粒糖，小明食咗 ${d18b} 粒，仲有幾多粒？`, a: String(d18), c: shuffle([String(d18 - 1), String(d18), String(d18 + 1)]) }
        ]
      },
      {
        title: "E. 圖形認識",
        questions: [
          { t: "19. 邊個係圓形？", a: "○", c: ["○", "□", "△"] },
          { t: "20. 邊個係三角形？", a: "△", c: ["□", "△", "○"] },
          { t: "21. 邊個係正方形？", a: "□", c: ["○", "□", "△"] }
        ]
      },
      {
        title: "F. 規律題",
        questions: [
          { t: "22. ○ △ ○ △ ○ ____ 下一個係？", a: "△", c: ["○", "△", "□"] },
          { t: "23. □ □ ○ □ □ ○ ____ 下一個係？", a: "□", c: ["○", "□", "△"] },
          { t: `24. ${f24 - 4}, ${f24 - 3}, ${f24 - 2}, ${f24 - 1}, ____`, a: String(f24), c: shuffle([String(f24), String(f24 + 1), String(f24 + 2)]) },
          { t: `25. ${f25base}, ${f25base + f25step}, ${f25base + f25step * 2}, ____`, a: String(f25), c: shuffle([String(f25 - 1), String(f25), String(f25 + 1)]) }
        ]
      },
      {
        title: "G. 時鐘問題",
        questions: [
          { t: `26. 以下邊個時鐘係 ${timeLabel(gTimes[0].h, gTimes[0].m)}？`, a: timeLabel(gTimes[0].h, gTimes[0].m), c: timeChoices(gTimes[0].h, gTimes[0].m) },
          { t: `27. 以下邊個時鐘係 ${timeLabel(gTimes[1].h, gTimes[1].m)}？`, a: timeLabel(gTimes[1].h, gTimes[1].m), c: timeChoices(gTimes[1].h, gTimes[1].m) },
          { t: `28. 以下邊個時鐘係 ${timeLabel(gTimes[2].h, gTimes[2].m)}？`, a: timeLabel(gTimes[2].h, gTimes[2].m), c: timeChoices(gTimes[2].h, gTimes[2].m) },
          { t: `29. 以下邊個時鐘係 ${timeLabel(gTimes[3].h, gTimes[3].m)}？`, a: timeLabel(gTimes[3].h, gTimes[3].m), c: timeChoices(gTimes[3].h, gTimes[3].m) },
          { t: `30. 以下邊個時鐘係 ${timeLabel(gTimes[4].h, gTimes[4].m)}？`, a: timeLabel(gTimes[4].h, gTimes[4].m), c: timeChoices(gTimes[4].h, gTimes[4].m) }
        ]
      }
    ];
    };

    const quiz = document.getElementById('quiz');
    const renderQuiz = () => {
      quiz.innerHTML = '';
      const sections = buildSections();
      let idx = 0;
      for (const section of sections) {
      const box = document.createElement('section');
      box.className = 'section';
      const h2 = document.createElement('h2');
      h2.textContent = section.title;
      box.appendChild(h2);

      for (const q of section.questions) {
        idx++;
        const qWrap = document.createElement('div');
        qWrap.className = 'q';
        qWrap.dataset.answer = q.a;

        const head = document.createElement('div');
        head.className = 'q-head';

        const p = document.createElement('p');
        p.textContent = q.t;

        const speakBtn = document.createElement('button');
        speakBtn.type = 'button';
        speakBtn.className = 'speak-btn';
        speakBtn.textContent = '🔊 讀題';
        speakBtn.dataset.text = q.t;

        head.appendChild(p);
        head.appendChild(speakBtn);
        qWrap.appendChild(head);

        const choices = document.createElement('div');
        choices.className = 'choices';

        q.c.forEach((item, i) => {
          const label = document.createElement('label');
          label.className = 'choice';
          const rawText = typeof item === 'string' ? item : item.value;
          if (/^[○△□]$/.test(rawText.trim())) label.classList.add('symbol-choice');

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = `q${idx}`;
          input.value = rawText;
          if (i === 0) input.required = true;

          label.appendChild(input);
          if (typeof item === 'object' && item.clock) {
            const wrap = document.createElement('div');
            wrap.className = 'clock-option';
            const clock = document.createElement('div');
            clock.className = 'mini-clock';
            const hour = document.createElement('span');
            hour.className = 'hand hour';
            const minute = document.createElement('span');
            minute.className = 'hand minute';
            const dot = document.createElement('span');
            dot.className = 'dot';
            for (let n = 1; n <= 12; n++) {
              const num = document.createElement('span');
              num.className = 'num';
              num.textContent = String(n);
              const deg = n * 30;
              const r = 42;
              const x = Math.sin((deg * Math.PI) / 180) * r;
              const y = -Math.cos((deg * Math.PI) / 180) * r;
              num.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
              clock.appendChild(num);
            }
            const minDeg = item.clock.m * 6;
            const hourDeg = ((item.clock.h % 12) * 30) + (item.clock.m * 0.5);
            hour.style.transform = `rotate(${hourDeg}deg)`;
            minute.style.transform = `rotate(${minDeg}deg)`;
            clock.appendChild(hour);
            clock.appendChild(minute);
            clock.appendChild(dot);
            wrap.appendChild(clock);
            label.appendChild(wrap);
          } else {
            label.appendChild(document.createTextNode(rawText));
          }
          choices.appendChild(label);
        });

        qWrap.appendChild(choices);

        const fb = document.createElement('div');
        fb.className = 'feedback';
        qWrap.appendChild(fb);

        box.appendChild(qWrap);
      }

        quiz.appendChild(box);
      }
    };
    renderQuiz();

    const score = document.getElementById('score');
    const synth = window.speechSynthesis;
    let voiceCache = [];
    const loadVoices = () => {
      voiceCache = synth ? synth.getVoices() : [];
    };
    loadVoices();
    if (synth) synth.addEventListener('voiceschanged', loadVoices);

    const getNaturalVoice = () => {
      if (!voiceCache.length) return null;
      return (
        voiceCache.find(v => v.lang === 'zh-HK') ||
        voiceCache.find(v => v.lang.startsWith('zh-HK')) ||
        voiceCache.find(v => v.lang === 'yue-HK') ||
        voiceCache.find(v => v.lang.startsWith('yue')) ||
        voiceCache.find(v => v.lang.startsWith('zh')) ||
        voiceCache[0]
      );
    };

    const speakText = text => {
      if (!synth) return;
      synth.cancel();
      const u = new SpeechSynthesisUtterance(text.replace(/[🍎⭐🐟⚽🌸🐤🐰🍓🚗]/g, ' '));
      const voice = getNaturalVoice();
      if (voice) u.voice = voice;
      u.lang = voice?.lang || 'zh-HK';
      u.rate = 0.92;
      u.pitch = 1.0;
      u.volume = 1;
      synth.speak(u);
    };

    quiz.addEventListener('click', e => {
      const btn = e.target.closest('.speak-btn');
      if (!btn) return;
      speakText(btn.dataset.text || '');
    });

    document.getElementById('checkBtn').addEventListener('click', () => {
      const blocks = [...document.querySelectorAll('.q')];
      let correct = 0;

      blocks.forEach(block => {
        const picked = block.querySelector('input:checked');
        const answer = block.dataset.answer;
        const fb = block.querySelector('.feedback');

        if (!picked) {
          fb.textContent = '請先選一個答案喔～';
          fb.className = 'feedback bad';
          return;
        }

        if (picked.value === answer) {
          correct++;
          fb.textContent = '答對啦！好叻！';
          fb.className = 'feedback ok';
        } else {
          fb.textContent = `再試下，正確答案係：${answer}`;
          fb.className = 'feedback bad';
        }
      });

      score.textContent = `你答啱 ${correct} / ${blocks.length} 題 🎉`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      quiz.reset();
      document.querySelectorAll('.feedback').forEach(f => {
        f.textContent = '';
        f.className = 'feedback';
      });
      score.textContent = '未交卷';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.getElementById('randomBtn').addEventListener('click', () => {
      if (synth) synth.cancel();
      renderQuiz();
      score.textContent = '已隨機新題目，請開始作答';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.getElementById('openNumPageBtn').addEventListener('click', buildNumberPage);

    const rootStyle = document.documentElement.style;
    const fontSlider = document.getElementById('fontSlider');
    const setFontSizes = size => {
      const n = Number(size);
      rootStyle.setProperty('--question-size', `${n}rem`);
      rootStyle.setProperty('--choice-size', `${Math.max(1.1, n - 0.18)}rem`);
    };
    setFontSizes(fontSlider.value);
    fontSlider.addEventListener('input', () => setFontSizes(fontSlider.value));
  </script>
</body>
</html>
