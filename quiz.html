<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K2 數學練習題</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #dff7ff;
      --ink: #2d2a32;
      --line: #dce7ff;
      --shadow: 0 8px 20px rgba(45, 42, 50, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 16px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      border: 3px dashed #ffc6dc;
      border-radius: 24px;
      background: #ffffffcc;
      padding: 16px;
    }
    h1 {
      text-align: center;
      margin: 8px 0;
      font-size: clamp(1.6rem, 4vw, 2.3rem);
    }
    .subtitle {
      text-align: center;
      margin: 0 0 14px;
      font-weight: 700;
      color: #50586b;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, #f2ecff, #e2d6ff);
      box-shadow: var(--shadow);
    }
    .card {
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
    }
    .card h2 { margin: 0 0 8px; }
    .note { color: #4d5a73; font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🌈 K2 數學練習題 ✴️</h1>
    <p class="subtitle">適合 4-5 歲小朋友，輕鬆按選擇題學數學</p>

    <div class="toolbar">
      <button type="button" id="openNumPageBtn">🔢 1-100 數字圖案頁</button>
    </div>

    <section class="card">
      <h2>已修復編碼</h2>
      <p class="note">主頁已改回正常 UTF-8。按上面按鈕會打開 1-100 頁面，並提供「全部 / 單數 / 雙數」快速鍵。</p>
    </section>
  </main>

  <script>
    const symbolMap = {
      none: "",
      apple: "🍎",
      star: "⭐",
      fish: "🐟",
      flower: "🌸",
      car: "🚗",
      circle: "⚪"
    };

    const buildNumberPage = () => {
      const html = `<!DOCTYPE html>
<html lang="zh-HK"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔢 1-100 數字圖案頁</title>
<style>
:root{--cell-size:2.9rem}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(150deg,#fff7d6,#dff7ff);padding:16px;color:#2d2a32}
.wrap{max-width:980px;margin:0 auto;background:#ffffffcc;border:3px dashed #ffc6dc;border-radius:24px;padding:14px}
h1{margin:6px 0 12px;text-align:center}
.top,.quick-filter{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.picker,.font-slider{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:8px 12px;font-weight:800}
select{border-radius:10px;border:2px solid #d6e5ff;padding:6px 8px;font-size:1rem}
.font-slider input{width:190px;accent-color:#63a2ff}
.filter-btn{border:0;border-radius:999px;padding:8px 14px;font-size:1rem;font-weight:800;background:linear-gradient(180deg,#eef7ff,#d8ecff);cursor:pointer}
.filter-btn.active{background:linear-gradient(180deg,#dcffe8,#abf0ca)}
.num-grid{margin-top:14px;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.num-cell{background:#fff;border:2px solid #dde7ff;border-radius:12px;padding:12px;font-weight:800;font-size:var(--cell-size);min-height:148px;display:flex;align-items:center;justify-content:center;gap:14px}
.num-cell .n{font-size:1.25em;font-weight:900}
.num-cell.active{background:linear-gradient(180deg,#fffef0,#fff6bd);box-shadow:0 0 0 2px #ffe27a inset}
@media (max-width:700px){.num-grid{grid-template-columns:repeat(3,minmax(0,1fr));}.num-cell{min-height:120px}}
</style></head>
<body><main class="wrap"><h1>🔢 1-100 數字圖案頁</h1>
<div class="top"><label class="picker">圖案：
<select id="shapeSel"><option value="none">🔢 只顯示數字</option><option value="apple">🍎 蘋果</option><option value="star">⭐ 星星</option><option value="fish">🐟 小魚</option><option value="flower">🌸 花花</option><option value="car">🚗 車仔</option><option value="circle">⚪ 圓點</option></select></label>
<label class="font-slider">字體<input type="range" id="cellFontSlider" min="2.0" max="4.6" step="0.05" value="2.9"></label></div>
<div class="quick-filter"><button type="button" class="filter-btn active" data-filter="all">全部</button><button type="button" class="filter-btn" data-filter="odd">單數</button><button type="button" class="filter-btn" data-filter="even">雙數</button></div>
<section id="grid" class="num-grid"></section></main>
<script>
const symbolMap=${JSON.stringify(symbolMap)};
const grid=document.getElementById('grid');
const sel=document.getElementById('shapeSel');
const fontSlider=document.getElementById('cellFontSlider');
const filterButtons=document.querySelectorAll('.filter-btn');
let currentFilter='all';
function draw(){const s=symbolMap[sel.value]||'';grid.innerHTML='';for(let i=1;i<=100;i++){if(currentFilter==='odd'&&i%2===0)continue;if(currentFilter==='even'&&i%2===1)continue;const d=document.createElement('div');d.className='num-cell';d.innerHTML=s?'<span>'+s+'</span><span class="n">'+i+'</span>':'<span class="n">'+i+'</span>';d.addEventListener('click',()=>d.classList.toggle('active'));grid.appendChild(d);}}
fontSlider.addEventListener('input',()=>document.documentElement.style.setProperty('--cell-size',fontSlider.value+'rem'));
filterButtons.forEach(btn=>btn.addEventListener('click',()=>{currentFilter=btn.dataset.filter;filterButtons.forEach(b=>b.classList.toggle('active',b===btn));draw();}));
sel.addEventListener('change',draw);
document.documentElement.style.setProperty('--cell-size',fontSlider.value+'rem');
draw();
<\/script></body></html>`;

      const w = window.open('', '_blank');
      if (!w) return;
      w.document.open();
      w.document.write(html);
      w.document.close();
    };

    document.getElementById('openNumPageBtn').addEventListener('click', buildNumberPage);
  </script>
</body>
</html>
