<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>K2 數學練習題</title>
  <style>
    :root {
      --paper: #fffaf0;
      --panel: #ffffff;
      --ink: #27313f;
      --muted: #677283;
      --line: #dfe8ef;
      --rose: #ff7fa3;
      --teal: #20c7a4;
      --blue: #4f8cff;
      --gold: #ffd166;
      --green: #28a86b;
      --red: #d84c5f;
      --shadow: 0 10px 22px rgba(39, 49, 63, 0.11);
      --radius: 8px;
      --q-size: 2.35rem;
      --choice-size: 1.95rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(255, 209, 102, 0.26) 0 25%, transparent 25% 100%),
        linear-gradient(225deg, rgba(32, 199, 164, 0.22) 0 24%, transparent 24% 100%),
        #f5fbff;
      padding: 14px;
      font-size: 18px;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: var(--panel);
      border: 2px solid #eef3f7;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.05rem, 4vw, 3.1rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .hero-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 42px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f2f7fb;
      color: var(--ink);
      font-weight: 900;
      white-space: nowrap;
      font-size: 1.08rem;
    }

    .score-pill {
      min-width: 180px;
      justify-content: center;
      background: #fff5cf;
      border: 2px solid #ffe49b;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin: 12px 0;
      align-items: center;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      background: rgba(255, 255, 255, 0.74);
      border: 2px solid #eef3f7;
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: var(--shadow);
    }

    .tab-btn,
    .soft-btn,
    .icon-btn,
    .symbol-btn {
      min-height: 58px;
      border-radius: var(--radius);
      font-weight: 950;
      color: #202938;
      background: #ffffff;
      border: 2px solid transparent;
      box-shadow: 0 2px 0 rgba(255, 255, 255, 0.9) inset;
    }

    .tab-btn {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 1.2rem;
    }

    .tab-btn.active {
      background: #e7f2ff;
      border-color: #9fc7ff;
      color: #164a91;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .soft-btn {
      padding: 12px 16px;
      min-width: 138px;
      font-size: 1.16rem;
    }

    .soft-btn.primary { background: #dff8ef; border-color: #9ce7cd; }
    .soft-btn.gold { background: #fff2bf; border-color: #ffd96b; }
    .soft-btn.blue { background: #e6f0ff; border-color: #aacaff; }
    .soft-btn.rose { background: #ffe8ef; border-color: #ffb1c6; }

    .font-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 58px;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: #fff;
      border: 2px solid #eef3f7;
      font-weight: 900;
      font-size: 1.12rem;
    }

    .font-control input {
      width: 188px;
      accent-color: var(--blue);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .quiz-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 12px;
      align-items: start;
    }

    body.focus .quiz-layout {
      grid-template-columns: minmax(0, 1fr);
    }

    body.focus .progress-panel {
      display: none;
    }

    .question-card,
    .progress-panel,
    .number-panel,
    .game-panel,
    .compare-panel,
    .math-lab {
      background: var(--panel);
      border: 2px solid #eef3f7;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .question-card {
      min-height: 590px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .q-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: #f2f7fb;
      color: #364252;
      font-weight: 950;
      font-size: 1.18rem;
    }

    .q-count {
      font-weight: 950;
      color: var(--muted);
      font-size: 1.18rem;
    }

    .question-text {
      min-height: 146px;
      display: flex;
      align-items: center;
      margin: 0;
      padding: 18px;
      border-radius: var(--radius);
      border: 2px dashed #f1cdd9;
      background: #fffdf7;
      font-size: var(--q-size);
      line-height: 1.38;
      font-weight: 950;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 12px;
    }

    .answer-card {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 108px;
      border: 3px solid #dfe8ef;
      border-radius: var(--radius);
      background: #fff;
      font-size: var(--choice-size);
      font-weight: 950;
      text-align: center;
      padding: 12px;
      user-select: none;
    }

    .answer-card input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .answer-card:has(input:checked) {
      border-color: var(--blue);
      background: #eaf3ff;
      box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.18);
    }

    .answer-card.correct {
      border-color: var(--green);
      background: #e7f8ef;
    }

    .answer-card.wrong {
      border-color: var(--red);
      background: #ffecef;
    }

    .answer-card.symbol {
      font-size: calc(var(--choice-size) + 0.55rem);
    }

    .feedback {
      min-height: 60px;
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #f5f8fb;
      color: var(--muted);
      font-size: 1.25rem;
      font-weight: 950;
    }

    .feedback.ok {
      background: #e5f8ee;
      color: #157348;
    }

    .feedback.bad {
      background: #fff0f2;
      color: #bd334b;
    }

    .q-actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .progress-panel {
      padding: 12px;
      position: sticky;
      top: 12px;
    }

    .progress-panel h2,
    .number-panel h2,
    .game-panel h2,
    .compare-panel h2,
    .math-lab h2 {
      margin: 0 0 10px;
      font-size: 1.38rem;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      margin-top: 8px;
    }

    .dot {
      min-height: 50px;
      border-radius: var(--radius);
      background: #f2f7fb;
      color: #526071;
      font-weight: 950;
      border: 2px solid transparent;
      font-size: 1.08rem;
    }

    .dot.current {
      background: #e7f2ff;
      border-color: #9fc7ff;
      color: #164a91;
    }

    .dot.done {
      background: #e5f8ee;
      color: #157348;
    }

    .dot.miss {
      background: #fff0f2;
      color: #bd334b;
    }

    .mini-clock {
      width: 116px;
      height: 116px;
      border: 3px solid #283343;
      border-radius: 50%;
      background: #fffdf7;
      position: relative;
      flex-shrink: 0;
    }

    .mini-clock .num {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 950;
      color: #27313f;
      pointer-events: none;
    }

    .mini-clock .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
    }

    .mini-clock .hour {
      width: 5px;
      height: 32px;
      margin-left: -2.5px;
      background: #27313f;
    }

    .mini-clock .minute {
      width: 4px;
      height: 44px;
      margin-left: -2px;
      background: #e34f64;
    }

    .mini-clock .dot-mid {
      width: 13px;
      height: 13px;
      background: #27313f;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .number-panel,
    .game-panel,
    .compare-panel {
      padding: 14px;
    }

    .panel-tools {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .picker {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 2px solid #eef3f7;
      border-radius: var(--radius);
      padding: 7px 10px;
      font-weight: 950;
    }

    .picker select,
    .num-input {
      border: 2px solid #dfe8ef;
      border-radius: var(--radius);
      min-height: 64px;
      padding: 6px 10px;
      background: #fff;
      font-weight: 950;
      font-size: 1.55rem;
      text-align: center;
    }

    .num-input {
      width: 118px;
      line-height: 1;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .num-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .num-cell {
      min-height: 136px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px;
      border-radius: var(--radius);
      border: 2px solid #dfe8ef;
      background: #fffdf7;
      font-size: var(--cell-size, 3.35rem);
      font-weight: 950;
    }

    .num-label {
      font-size: 1.05em;
      line-height: 1;
    }

    .character-badge {
      width: 78px;
      height: 78px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: var(--radius);
      border: 2px solid #dfe8ef;
      background: #eef5ff;
      color: #173b6d;
      font-size: 0.88rem;
      font-weight: 950;
      line-height: 1.1;
      text-align: center;
    }

    .character-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .math-icons .character-badge {
      width: 68px;
      height: 68px;
      font-size: 0.8rem;
    }

    .num-cell.active {
      background: #fff3ba;
      border-color: #ffce4a;
      box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.26);
    }

    .math-lab {
      margin-top: 12px;
      padding: 14px;
      background: #fffdf7;
    }

    .math-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: start;
    }

    .math-side {
      display: grid;
      gap: 8px;
      justify-items: center;
      background: #fff;
      border: 2px solid #eef3f7;
      border-radius: var(--radius);
      padding: 10px;
    }

    .math-icons {
      min-height: 138px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 2.9rem;
      line-height: 1;
    }

    .stepper {
      width: min(100%, 360px);
      display: grid;
      grid-template-columns: 86px 118px 86px;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }

    .icon-btn {
      min-width: 86px;
      min-height: 70px;
      padding: 6px;
      font-size: 2.45rem;
      line-height: 1;
      background: #eaf3ff;
      border-color: #aacaff;
    }

    .op-select {
      width: 104px;
      min-height: 76px;
      border-radius: var(--radius);
      border: 2px solid #dfe8ef;
      text-align: center;
      font-size: 2.3rem;
      font-weight: 950;
      background: #fff;
    }

    .equation {
      margin-top: 12px;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      background: #eefaf6;
      color: #186d59;
      font-size: 2.55rem;
      font-weight: 950;
    }

    .monster-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .monster {
      border: 2px solid #dfe8ef;
      border-radius: var(--radius);
      background: #fffdf7;
      padding: 14px;
      text-align: center;
    }

    .monster-face {
      font-size: 4.4rem;
      line-height: 1;
    }

    .monster h3 {
      margin: 8px 0 5px;
      font-size: 1.65rem;
    }

    .target {
      color: #42506a;
      font-weight: 950;
      margin-bottom: 8px;
      font-size: 1.22rem;
    }

    .mouth {
      min-height: 136px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border-radius: var(--radius);
      border: 3px dashed #f5a7bd;
      background: #fff;
      font-size: 2.35rem;
      padding: 8px;
    }

    .fruit-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
      padding: 10px;
      border-radius: var(--radius);
      background: #f2f7fb;
    }

    .fruit {
      width: 66px;
      height: 66px;
      border-radius: var(--radius);
      border: 2px solid #dfe8ef;
      background: #fff;
      font-size: 2.4rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .fruit.selected {
      border-color: var(--blue);
      background: #eaf3ff;
      box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.18);
    }

    .game-question {
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius);
      background: #fffdf7;
      border: 2px solid #dfe8ef;
    }

    .game-question h3 {
      margin: 0 0 8px;
      font-size: 1.55rem;
      text-align: center;
    }

    .game-answers {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .game-answer.active {
      border-color: var(--blue);
      background: #eaf3ff;
    }

    .game-answer.correct {
      border-color: var(--green);
      background: #e7f8ef;
    }

    .game-answer.wrong {
      border-color: var(--red);
      background: #fff0f2;
    }

    .game-result,
    .compare-score {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      border-radius: var(--radius);
      background: #f5f8fb;
      color: #526071;
      font-weight: 950;
      text-align: center;
      padding: 8px;
      font-size: 1.22rem;
    }

    .compare-list {
      display: grid;
      gap: 10px;
    }

    .compare-card {
      display: grid;
      grid-template-columns: 1fr 180px 1fr;
      gap: 12px;
      align-items: center;
      border: 2px solid #dfe8ef;
      border-radius: var(--radius);
      background: #fffdf7;
      padding: 10px;
    }

    .compare-side {
      min-height: 106px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: var(--radius);
      border: 2px solid #eef3f7;
      line-height: 1;
    }

    .compare-ops {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .symbol-btn {
      min-width: 0;
      min-height: 62px;
      font-size: 2rem;
      background: #fff;
      border-color: #dfe8ef;
    }

    .symbol-btn.active {
      border-color: var(--blue);
      background: #eaf3ff;
    }

    .compare-card.correct {
      border-color: var(--green);
      background: #e7f8ef;
    }

    .compare-card.wrong {
      border-color: var(--red);
      background: #fff0f2;
    }

    .popup-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(25, 35, 48, 0.35);
      z-index: 100;
      padding: 18px;
    }

    .popup {
      width: min(420px, 100%);
      background: #fffdf7;
      border-radius: var(--radius);
      border: 3px solid #ffcf58;
      box-shadow: 0 18px 36px rgba(25, 35, 48, 0.22);
      padding: 22px;
      text-align: center;
    }

    .popup h2 {
      margin: 0 0 8px;
      font-size: 2.35rem;
    }

    .popup p {
      margin: 0 0 16px;
      font-size: 1.38rem;
      font-weight: 950;
    }

    @media (max-width: 860px) {
      .hero,
      .toolbar,
      .quiz-layout {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: stretch;
      }

      .controls > * {
        flex: 1 1 170px;
      }

      .progress-panel {
        position: static;
      }

      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body { padding: 8px; }
      .question-card { min-height: auto; }
      .question-text { min-height: 116px; }
      .q-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .num-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .num-cell { min-height: 104px; }
      .game-answers { grid-template-columns: 1fr; }
      .math-row,
      .monster-grid,
      .compare-card {
        grid-template-columns: 1fr;
      }
      .op-select {
        width: 100%;
      }
    }
  </style>
</head>
<body class="focus">
  <main class="app">
    <header class="hero">
      <div>
        <h1>🌈 K2 數學練習題</h1>
        <div class="hero-line">
          <span class="pill">🎯 專注一題</span>
          <span class="pill">🔊 可讀題</span>
          <span class="pill">👆 平板大按鈕</span>
        </div>
      </div>
      <div class="pill score-pill" id="topScore">未交卷</div>
    </header>

    <div class="toolbar">
      <nav class="tabs" aria-label="練習模式">
        <button type="button" class="tab-btn active" data-view="quizView">🧮 練習</button>
        <button type="button" class="tab-btn" data-view="numberView">🔢 數字</button>
        <button type="button" class="tab-btn" data-view="gameView">👾 遊戲</button>
        <button type="button" class="tab-btn" data-view="compareView">⚖️ 大小</button>
      </nav>
      <div class="controls">
        <button type="button" class="soft-btn blue" id="focusBtn">👀 專注模式</button>
        <label class="font-control">🔡
          <input type="range" id="fontSlider" min="1.8" max="3.2" step="0.05" value="2.35" />
          🔠
        </label>
      </div>
    </div>

    <section class="view active" id="quizView">
      <div class="quiz-layout">
        <article class="question-card" aria-live="polite">
          <div class="q-top">
            <span class="section-tag" id="sectionTag">A. 數一數</span>
            <span class="q-count" id="questionCount">1 / 21</span>
          </div>
          <p class="question-text" id="questionText"></p>
          <div class="answer-grid" id="answerGrid"></div>
          <div class="feedback" id="feedback">揀一個答案，完成後可以交卷睇分數。</div>
          <div class="q-actions">
            <button type="button" class="soft-btn blue" id="prevBtn">← 上一題</button>
            <button type="button" class="soft-btn blue" id="speakBtn">🔊 讀題</button>
            <button type="button" class="soft-btn blue" id="nextBtn">下一題 →</button>
            <button type="button" class="soft-btn primary" id="checkBtn">✅ 交卷</button>
          </div>
          <div class="q-actions">

    <section class="view" id="numberView">
      <article class="number-panel">

        <div class="panel-tools">

        <h2>➕➖ 圖案加減修改器</h2>
        <div class="panel-tools">
          <label class="picker">圖案
            <select id="mathIconSelect">
              <option value="🍎">🍎 蘋果</option>
              <option value="⭐">⭐ 星星</option>
              <option value="🐟">🐟 小魚</option>
              <option value="🌸">🌸 花花</option>
              <option value="🚗">🚗 車仔</option>
              <option value="⚪">⚪ 圓點</option>
              <option value="ironman">🦾 IRONMAN</option>
              <option value="spiderman">🕷️ SPIDERMAN</option>

            <option value="-">−</option>

            <div class="math-icons" id="rightIcons"></div>
            <div class="stepper">
              <button type="button" class="icon-btn" id="rightMinus">−</button>
              <input class="num-input" id="rightNum" type="number" min="0" max="20" value="1" />

      <article class="game-panel">

          <button type="button" class="soft-btn rose" id="resetGameBtn">↺ 清空</button>

        <div class="monster-grid">
          <button type="button" class="monster" id="monsterA">
            <div class="monster-face">👁️👾</div>
            <h3>大眼怪</h3>
            <div class="target" id="targetA">目標：4 個</div>
            <div class="mouth" id="mouthA"></div>
          </button>
          <button type="button" class="monster" id="monsterB">
            <div class="monster-face">🧶👾</div>
            <h3>毛毛怪</h3>
            <div class="target" id="targetB">目標：7 個</div>
            <div class="mouth" id="mouthB"></div>
          </button>

        <div class="game-result" id="gameResult">先揀水果，再餵怪獸。</div>
        <div class="game-question">
          <h3 id="moreQuestion">邊一隻食多啲？</h3>
          <div class="game-answers">
            <button type="button" class="soft-btn game-answer" data-answer="a">大眼怪</button>
            <button type="button" class="soft-btn game-answer" data-answer="b">毛毛怪</button>
            <button type="button" class="soft-btn game-answer" data-answer="same">一樣多</button>

    <section class="view" id="compareView">
      <article class="compare-panel">
        <h2>⚖️ 比較大小 10 題</h2>
        <div class="panel-tools">
          <button type="button" class="soft-btn primary" id="checkCompareBtn">✅ 交卷</button>
          <button type="button" class="soft-btn gold" id="newCompareBtn">🎲 重新出題</button>
        </div>
        <div class="compare-list" id="compareList"></div>
        <div class="compare-score" id="compareScore">完成 10 題後交卷。</div>
      </article>

  </main>

  <div class="popup-mask" id="winPopup">
    <div class="popup">
      <h2>🥳 好叻呀！</h2>
      <p id="popupText">恭喜答啱 80% 以上！</p>
      <button type="button" class="soft-btn primary" id="closePopup">好呀！</button>
    </div>
  </div>

  <script>
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    const repeatIcon = (icon, n) => Array.from({ length: n }, () => icon).join("");
    const clamp = (n, min, max) => Math.max(min, Math.min(max, Number(n) || 0));

    const synth = window.speechSynthesis;
    let voiceCache = [];

    const loadVoices = () => {
      voiceCache = synth ? synth.getVoices() : [];
    };

    loadVoices();
    if (synth) synth.addEventListener("voiceschanged", loadVoices);

    const getVoice = () => (
      voiceCache.find(v => v.lang === "zh-HK") ||
      voiceCache.find(v => v.lang.startsWith("zh-HK")) ||
      voiceCache.find(v => v.lang === "yue-HK") ||
      voiceCache.find(v => v.lang.startsWith("yue")) ||
      voiceCache.find(v => v.lang.startsWith("zh")) ||
      voiceCache[0] ||
      null
    );

    const speakText = text => {
      if (!synth) return;
      synth.cancel();
      const clean = text.replace(/[🍎⭐🐟⚽🌸🐤🐰🍓🚗⚪👾🧶👁️]/g, " ");
      const utterance = new SpeechSynthesisUtterance(clean);
      const voice = getVoice();
      if (voice) utterance.voice = voice;
      utterance.lang = voice?.lang || "zh-HK";
      utterance.rate = 0.9;
      utterance.pitch = 1;
      synth.speak(utterance);
    };

    const views = document.querySelectorAll(".view");
    const tabButtons = document.querySelectorAll(".tab-btn");

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        tabButtons.forEach(b => b.classList.remove("active"));
        views.forEach(v => v.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.view).classList.add("active");
        if (synth) synth.cancel();
      });
    });

    document.getElementById("focusBtn").addEventListener("click", () => {
      document.body.classList.toggle("focus");
    });

    const fontSlider = document.getElementById("fontSlider");
    const setFontSize = () => {
      const n = Number(fontSlider.value);
      document.documentElement.style.setProperty("--q-size", `${n}rem`);
      document.documentElement.style.setProperty("--choice-size", `${Math.max(1.18, n - 0.35)}rem`);
    };
    fontSlider.addEventListener("input", setFontSize);
    setFontSize();

    const timeLabel = (h, m) => `${h}時${m}分`;
    const timeChoices = (h, m) => {
      const wrongA = { h: h === 12 ? 1 : h + 1, m };
      const wrongB = { h, m: (m + 30) % 60 };
      return shuffle([{ h, m }, wrongA, wrongB]).map(t => ({
        value: timeLabel(t.h, t.m),
        clock: { h: t.h, m: t.m }
      }));
    };

    const buildQuiz = () => {
      const a1 = randInt(2, 7);
      const a2 = randInt(3, 8);
      const a3 = randInt(2, 6);
      const a4 = randInt(1, 5);
      const a5 = randInt(4, 8);
      const b6L = randInt(2, 6);
      const b6R = randInt(1, b6L - 1);
      const b7L = randInt(1, 4);
      const b7R = randInt(b7L + 1, 6);
      const c10a = randInt(1, 4);
      const c10b = randInt(1, 4);
      const c11a = randInt(2, 5);
      const c11b = randInt(1, 4);
      const c12a = randInt(2, 5);
      const c12b = randInt(1, 3);
      const c13a = randInt(3, 6);
      const c13b = randInt(1, 3);
      const c14a = randInt(2, 5);
      const c14b = randInt(1, 4);
      const d15a = randInt(4, 8);
      const d15b = randInt(1, 3);
      const d16a = randInt(4, 8);
      const d16b = randInt(1, Math.min(4, d16a - 1));
      const d17a = randInt(5, 9);
      const d17b = randInt(1, Math.min(4, d17a - 1));
      const d18a = randInt(4, 8);
      const d18b = randInt(1, Math.min(3, d18a - 1));
      const f24 = randInt(4, 8);
      const f25step = randInt(2, 3);
      const f25base = randInt(1, 3);
      const gTimes = [
        { h: randInt(1, 11), m: 0 },
        { h: randInt(1, 11), m: 30 },
        { h: randInt(1, 11), m: 15 },
        { h: randInt(1, 11), m: 45 },
        { h: randInt(1, 11), m: [0, 10, 20, 30, 40, 50][randInt(0, 5)] }
      ];

      const sections = [
        {
          title: "A. 數一數",
          questions: [
            { text: `${repeatIcon("🍎", a1)} 有幾多個蘋果？`, answer: String(a1), choices: shuffle([a1 - 1, a1, a1 + 1].map(String)) },
            { text: `${repeatIcon("⭐", a2)} 有幾多粒星星？`, answer: String(a2), choices: shuffle([a2 - 1, a2, a2 + 1].map(String)) },
            { text: `${repeatIcon("🐟", a3)} 有幾多條魚？`, answer: String(a3), choices: shuffle([a3 - 1, a3, a3 + 1].map(String)) },
            { text: `${repeatIcon("⚽", a4)} 有幾多個波？`, answer: String(a4), choices: shuffle([Math.max(0, a4 - 1), a4, a4 + 1].map(String)) },
            { text: `${repeatIcon("🌸", a5)} 有幾多朵花？`, answer: String(a5), choices: shuffle([a5 - 1, a5, a5 + 1].map(String)) }
          ]
        },
        {
          title: "B. 比較多與少",
          questions: [
            { text: `${repeatIcon("🐤", b6L)} vs ${repeatIcon("🐤", b6R)}，邊一邊比較多？`, answer: "左邊", choices: ["左邊", "右邊"] },
            { text: `${repeatIcon("🐰", b7L)} vs ${repeatIcon("🐰", b7R)}，邊一邊比較少？`, answer: "左邊", choices: ["左邊", "右邊"] },
            { text: "🍓🍓🍓 比 🍓🍓 ______。", answer: "多", choices: ["多", "少"] },
            { text: "🚗🚗 比 🚗🚗🚗 ______。", answer: "少", choices: ["多", "少"] }
          ]
        },
        {
          title: "C. 簡單加法",
          questions: [
            { text: `小明有 ${c10a} 粒糖，再加 ${c10b} 粒，一共有幾多粒？`, answer: String(c10a + c10b), choices: shuffle([c10a + c10b - 1, c10a + c10b, c10a + c10b + 1].map(String)) },
            { text: `媽媽買咗 ${c11a} 個橙，又買多 ${c11b} 個，一共有幾多個？`, answer: String(c11a + c11b), choices: shuffle([c11a + c11b - 1, c11a + c11b, c11a + c11b + 1].map(String)) },
            { text: `盒入面有 ${c12a} 支筆，再放入 ${c12b} 支，而家有幾多支？`, answer: String(c12a + c12b), choices: shuffle([c12a + c12b - 1, c12a + c12b, c12a + c12b + 1].map(String)) },
            { text: `${c13a} + ${c13b} = ?`, answer: String(c13a + c13b), choices: shuffle([c13a + c13b - 1, c13a + c13b, c13a + c13b + 1].map(String)) },
            { text: `媽媽有 ${c14a} 個橙，又買多 ${c14b} 個橙，一共幾多個？`, answer: String(c14a + c14b), choices: shuffle([c14a + c14b - 1, c14a + c14b, c14a + c14b + 1].map(String)) }
          ]
        },
        {
          title: "D. 簡單減法",
          questions: [
            { text: `小明有 ${d15a} 枝鉛筆，借咗 ${d15b} 枝畀同學，仲有幾多枝？`, answer: String(d15a - d15b), choices: shuffle([d15a - d15b - 1, d15a - d15b, d15a - d15b + 1].map(String)) },
            { text: `盤上有 ${d16a} 塊餅，食咗 ${d16b} 塊，仲有幾多塊？`, answer: String(d16a - d16b), choices: shuffle([d16a - d16b - 1, d16a - d16b, d16a - d16b + 1].map(String)) },
            { text: `有 ${d17a} 粒糖，送咗 ${d17b} 粒畀朋友，剩返幾多粒？`, answer: String(d17a - d17b), choices: shuffle([d17a - d17b - 1, d17a - d17b, d17a - d17b + 1].map(String)) },
            { text: `枱上有 ${d18a} 粒糖，小明食咗 ${d18b} 粒，仲有幾多粒？`, answer: String(d18a - d18b), choices: shuffle([d18a - d18b - 1, d18a - d18b, d18a - d18b + 1].map(String)) }
          ]
        },
        {
          title: "E. 圖形認識",
          questions: [
            { text: "邊個係圓形？", answer: "○", choices: ["○", "□", "△"] },
            { text: "邊個係三角形？", answer: "△", choices: ["□", "△", "○"] },
            { text: "邊個係正方形？", answer: "□", choices: ["○", "□", "△"] }
          ]
        },
        {
          title: "F. 規律題",
          questions: [
            { text: "○ △ ○ △ ○ ____ 下一個係？", answer: "△", choices: ["○", "△", "□"] },
            { text: "□ □ ○ □ □ ○ ____ 下一個係？", answer: "□", choices: ["○", "□", "△"] },
            { text: `${f24 - 4}, ${f24 - 3}, ${f24 - 2}, ${f24 - 1}, ____`, answer: String(f24), choices: shuffle([f24, f24 + 1, f24 + 2].map(String)) },
            { text: `${f25base}, ${f25base + f25step}, ${f25base + f25step * 2}, ____`, answer: String(f25base + f25step * 3), choices: shuffle([f25base + f25step * 3 - 1, f25base + f25step * 3, f25base + f25step * 3 + 1].map(String)) }
          ]
        },
        {
          title: "G. 時鐘問題",
          questions: gTimes.map(t => ({
            text: `以下邊個時鐘係 ${timeLabel(t.h, t.m)}？`,
            answer: timeLabel(t.h, t.m),
            choices: timeChoices(t.h, t.m)
          }))
        }
      ];

      return sections.flatMap(section => (
        shuffle(section.questions).slice(0, 3).map(q => ({ ...q, section: section.title }))
      ));
    };

    let quizQuestions = buildQuiz();
    let currentIndex = 0;
    let answers = Array(quizQuestions.length).fill(null);
    let submitted = false;

    const sectionTag = document.getElementById("sectionTag");
    const questionCount = document.getElementById("questionCount");
    const questionText = document.getElementById("questionText");
    const answerGrid = document.getElementById("answerGrid");
    const feedback = document.getElementById("feedback");
    const progressGrid = document.getElementById("progressGrid");
    const progressText = document.getElementById("progressText");
    const topScore = document.getElementById("topScore");
    const winPopup = document.getElementById("winPopup");

    const createClock = ({ h, m }) => {
      const clock = document.createElement("div");
      clock.className = "mini-clock";
      for (let n = 1; n <= 12; n++) {
        const num = document.createElement("span");
        num.className = "num";
        num.textContent = String(n);
        const deg = n * 30;
        const r = 47;
        const x = Math.sin((deg * Math.PI) / 180) * r;
        const y = -Math.cos((deg * Math.PI) / 180) * r;
        num.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
        clock.appendChild(num);
      }
      const hour = document.createElement("span");
      hour.className = "hand hour";
      hour.style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
      const minute = document.createElement("span");
      minute.className = "hand minute";
      minute.style.transform = `rotate(${m * 6}deg)`;
      const dot = document.createElement("span");
      dot.className = "dot-mid";
      clock.append(hour, minute, dot);
      return clock;
    };

    const renderProgress = () => {
      progressGrid.innerHTML = "";
      const answered = answers.filter(Boolean).length;
      progressText.textContent = `已答 ${answered} 題`;
      quizQuestions.forEach((q, i) => {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = "dot";
        dot.textContent = i + 1;
        if (i === currentIndex) dot.classList.add("current");
        if (submitted && answers[i]) {
          dot.classList.add(answers[i] === q.answer ? "done" : "miss");
        } else if (answers[i]) {
          dot.classList.add("done");
        }
        dot.addEventListener("click", () => {
          currentIndex = i;
          renderQuestion();
        });
        progressGrid.appendChild(dot);
      });
    };

    const setQuestionFeedback = () => {
      const q = quizQuestions[currentIndex];
      const picked = answers[currentIndex];
      feedback.className = "feedback";
      if (!picked) {
        feedback.textContent = "揀一個答案，完成後可以交卷睇分數。";
        return;
      }
      if (!submitted) {
        feedback.textContent = "已選好，可以下一題。";
        return;
      }
      if (picked === q.answer) {
        feedback.textContent = "答對啦！好叻！";
        feedback.classList.add("ok");
      } else {
        feedback.textContent = `再試下，正確答案係：${q.answer}`;
        feedback.classList.add("bad");
      }
    };

    const renderQuestion = () => {
      const q = quizQuestions[currentIndex];
      sectionTag.textContent = q.section;
      questionCount.textContent = `${currentIndex + 1} / ${quizQuestions.length}`;
      questionText.textContent = `${currentIndex + 1}. ${q.text}`;
      answerGrid.innerHTML = "";

      q.choices.forEach(choice => {
        const value = typeof choice === "string" ? choice : choice.value;
        const label = document.createElement("label");
        label.className = "answer-card";
        if (/^[○△□]$/.test(value)) label.classList.add("symbol");
        if (submitted) {
          if (value === q.answer) label.classList.add("correct");
          if (answers[currentIndex] === value && value !== q.answer) label.classList.add("wrong");
        }
        const input = document.createElement("input");
        input.type = "radio";
        input.name = "currentAnswer";
        input.value = value;
        input.checked = answers[currentIndex] === value;
        input.addEventListener("change", () => {
          answers[currentIndex] = value;
          setQuestionFeedback();
          renderProgress();
        });
        label.appendChild(input);
        if (typeof choice === "object" && choice.clock) {
          label.appendChild(createClock(choice.clock));
        } else {
          label.appendChild(document.createTextNode(value));
        }
        answerGrid.appendChild(label);
      });

      document.getElementById("prevBtn").disabled = currentIndex === 0;
      document.getElementById("nextBtn").disabled = currentIndex === quizQuestions.length - 1;
      setQuestionFeedback();
      renderProgress();
    };

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentIndex = Math.max(0, currentIndex - 1);
      renderQuestion();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentIndex = Math.min(quizQuestions.length - 1, currentIndex + 1);
      renderQuestion();
    });

    document.getElementById("speakBtn").addEventListener("click", () => {
      speakText(quizQuestions[currentIndex].text);
    });

    document.getElementById("checkBtn").addEventListener("click", () => {
      submitted = true;
      const correct = quizQuestions.reduce((sum, q, i) => sum + (answers[i] === q.answer ? 1 : 0), 0);
      topScore.textContent = `答啱 ${correct} / ${quizQuestions.length}`;
      renderQuestion();
      if (correct / quizQuestions.length >= 0.8) {
        document.getElementById("popupText").textContent = `你答啱 ${correct} / ${quizQuestions.length} 題！`;
        winPopup.style.display = "flex";
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      answers = Array(quizQuestions.length).fill(null);
      submitted = false;
      currentIndex = 0;
      topScore.textContent = "未交卷";
      renderQuestion();
    });

    document.getElementById("newQuizBtn").addEventListener("click", () => {
      quizQuestions = buildQuiz();
      answers = Array(quizQuestions.length).fill(null);
      submitted = false;
      currentIndex = 0;
      topScore.textContent = "新題目開始";
      renderQuestion();
    });

    document.getElementById("closePopup").addEventListener("click", () => {
      winPopup.style.display = "none";
    });

    renderQuestion();

    const numberGrid = document.getElementById("numberGrid");
    const shapeSelect = document.getElementById("shapeSelect");
    const cellSizeSlider = document.getElementById("cellSizeSlider");
    const characterIcons = {
      ironman: {
        name: "IRONMAN",
        symbol: "🦾",
        srcs: [
          "https://raw.githubusercontent.com/luclklam2/math/main/ironman.jpg",
          "ironman.jpg",
          "ironman.JPG",
          "ironman.png"
        ]
      },
      spiderman: {
        name: "SPIDERMAN",
        symbol: "🕷️",
        srcs: [
          "https://raw.githubusercontent.com/luclklam2/math/main/spiderman.JPG",
          "spiderman.JPG",
          "spiderman.jpg",
          "spiderman.png"
        ]
      }
    };

    const createCharacterBadge = key => {
      const data = characterIcons[key];
      const badge = document.createElement("span");
      badge.className = "character-badge";
      badge.title = data.name;
      const img = document.createElement("img");
      let sourceIndex = 0;
      img.src = data.srcs[sourceIndex];
      img.alt = data.name;
      img.loading = "eager";
      img.onerror = () => {
        sourceIndex++;
        if (sourceIndex < data.srcs.length) {
          img.src = data.srcs[sourceIndex];
          return;
        }
        badge.textContent = `${data.symbol} ${data.name}`;
      };
      badge.appendChild(img);
      return badge;
    };

    const fillIconArea = (target, icon, count) => {
      target.innerHTML = "";
      if (!count) {
        target.textContent = "0";
        return;
      }
      if (characterIcons[icon]) {
        for (let i = 0; i < count; i++) {
          target.appendChild(createCharacterBadge(icon));
        }
        return;
      }
      target.textContent = repeatIcon(icon, count);
    };

    const renderNumbers = () => {
      numberGrid.innerHTML = "";
      const icon = shapeSelect.value;
      for (let i = 1; i <= 100; i++) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "num-cell";
        cell.dataset.number = String(i);
        if (!icon) {
          cell.textContent = String(i);
        } else if (characterIcons[icon]) {
          const number = document.createElement("span");
          number.className = "num-label";
          number.textContent = String(i);
          cell.append(createCharacterBadge(icon), number);
        } else {
          cell.textContent = `${icon} ${i}`;
        }
        cell.addEventListener("click", () => {
          cell.classList.toggle("active");
          speakText(String(i));
        });
        numberGrid.appendChild(cell);
      }
    };

    shapeSelect.addEventListener("change", renderNumbers);
    cellSizeSlider.addEventListener("input", () => {
      document.documentElement.style.setProperty("--cell-size", `${cellSizeSlider.value}rem`);
    });
    document.getElementById("oddBtn").addEventListener("click", () => {
      document.querySelectorAll(".num-cell").forEach(cell => {
        const n = Number(cell.dataset.number);
        cell.classList.toggle("active", n % 2 === 1);
      });
    });
    document.getElementById("evenBtn").addEventListener("click", () => {
      document.querySelectorAll(".num-cell").forEach(cell => {
        const n = Number(cell.dataset.number);
        cell.classList.toggle("active", n % 2 === 0);
      });
    });
    document.documentElement.style.setProperty("--cell-size", `${cellSizeSlider.value}rem`);
    renderNumbers();

    const leftNum = document.getElementById("leftNum");
    const rightNum = document.getElementById("rightNum");
    const leftIcons = document.getElementById("leftIcons");
    const rightIcons = document.getElementById("rightIcons");
    const opSelect = document.getElementById("opSelect");
    const equation = document.getElementById("equation");
    const mathIconSelect = document.getElementById("mathIconSelect");

    const drawMath = () => {
      const a = clamp(leftNum.value, 0, 20);
      const b = clamp(rightNum.value, 0, 20);
      const icon = mathIconSelect.value;
      leftNum.value = a;
      rightNum.value = b;
      fillIconArea(leftIcons, icon, a);
      fillIconArea(rightIcons, icon, b);
      const op = opSelect.value;
      const answer = op === "+" ? a + b : Math.max(0, a - b);
      equation.textContent = `${a} ${op} ${b} = ${answer}`;
    };

    const stepValue = (input, delta) => {
      input.value = clamp(Number(input.value) + delta, 0, 20);
      drawMath();
    };

    document.getElementById("leftPlus").addEventListener("click", () => stepValue(leftNum, 1));
    document.getElementById("leftMinus").addEventListener("click", () => stepValue(leftNum, -1));
    document.getElementById("rightPlus").addEventListener("click", () => stepValue(rightNum, 1));
    document.getElementById("rightMinus").addEventListener("click", () => stepValue(rightNum, -1));
    [leftNum, rightNum, opSelect, mathIconSelect].forEach(el => el.addEventListener("input", drawMath));
    opSelect.addEventListener("change", drawMath);
    mathIconSelect.addEventListener("change", drawMath);
    drawMath();

    const foods = ["🍎", "🍌", "🍓", "🍇", "🍊", "🍉"];
    let foodA = "🍎";
    let foodB = "🍉";
    let targetA = 4;
    let targetB = 7;
    let selectedFruit = null;
    const fruitPool = document.getElementById("fruitPool");
    const mouthA = document.getElementById("mouthA");
    const mouthB = document.getElementById("mouthB");
    const gameResult = document.getElementById("gameResult");
    const gameAnswers = document.querySelectorAll(".game-answer");

    const eatenCount = mouth => mouth.children.length;

    const moreAnswer = () => {
      const a = eatenCount(mouthA);
      const b = eatenCount(mouthB);
      if (a === b) return "same";
      return a > b ? "a" : "b";
    };

    const clearGameAnswerMarks = () => {
      gameAnswers.forEach(btn => {
        btn.classList.remove("active", "correct", "wrong");
      });
    };

    const updateGameResult = () => {
      const a = eatenCount(mouthA);
      const b = eatenCount(mouthB);
      clearGameAnswerMarks();
      if (a === targetA && b === targetB) {
        gameResult.textContent = "✅ 剛剛好！而家答：邊一隻食多啲？";
      } else if (a > targetA || b > targetB) {
        gameResult.textContent = "想一想，可能有怪獸食多咗。";
      } else {
        gameResult.textContent = `大眼怪食 ${foodA}：${a}/${targetA}，毛毛怪食 ${foodB}：${b}/${targetB}`;
      }
    };

    const renderFruitPool = () => {
      fruitPool.innerHTML = "";
      selectedFruit = null;
      const foodItems = shuffle([
        ...Array.from({ length: targetA }, () => foodA),
        ...Array.from({ length: targetB }, () => foodB)
      ]);
      foodItems.forEach(food => {
        const fruit = document.createElement("button");
        fruit.type = "button";
        fruit.className = "fruit";
        fruit.textContent = food;
        fruit.dataset.food = food;
        fruit.addEventListener("click", () => {
          document.querySelectorAll(".fruit.selected").forEach(el => el.classList.remove("selected"));
          selectedFruit = fruit;
          fruit.classList.add("selected");
        });
        fruitPool.appendChild(fruit);
      });
    };

    const feedMonster = (mouth, expectedFood, monsterName) => {
      if (!selectedFruit) return;
      if (selectedFruit.dataset.food !== expectedFood) {
        gameResult.textContent = `${monsterName} 唔食 ${selectedFruit.dataset.food}，佢要食 ${expectedFood}。`;
        return;
      }
      if (eatenCount(mouth) >= (mouth === mouthA ? targetA : targetB)) {
        gameResult.textContent = `${monsterName} 已經食夠啦。`;
        return;
      }
      const bite = document.createElement("span");
      bite.textContent = selectedFruit.textContent;
      mouth.appendChild(bite);
      selectedFruit.remove();
      selectedFruit = null;
      updateGameResult();
    };

    const newGame = () => {
      targetA = randInt(3, 7);
      targetB = randInt(3, 7);
      foodA = foods[randInt(0, foods.length - 1)];
      do {
        foodB = foods[randInt(0, foods.length - 1)];
      } while (foodB === foodA);
      mouthA.innerHTML = "";
      mouthB.innerHTML = "";
      document.getElementById("targetA").textContent = `要食 ${foodA}：${targetA} 個`;
      document.getElementById("targetB").textContent = `要食 ${foodB}：${targetB} 個`;
      clearGameAnswerMarks();
      renderFruitPool();
      updateGameResult();
    };

    gameAnswers.forEach(btn => {
      btn.addEventListener("click", () => {
        const answer = moreAnswer();
        clearGameAnswerMarks();
        btn.classList.add("active", btn.dataset.answer === answer ? "correct" : "wrong");
        if (btn.dataset.answer === answer) {
          gameResult.textContent = "✅ 答啱！你識比較邊個食多啲。";
        } else {
          const correctText = answer === "same" ? "一樣多" : answer === "a" ? "大眼怪" : "毛毛怪";
          gameResult.textContent = `再睇清楚，正確係：${correctText}`;
        }
      });
    });

    document.getElementById("monsterA").addEventListener("click", () => feedMonster(mouthA, foodA, "大眼怪"));
    document.getElementById("monsterB").addEventListener("click", () => feedMonster(mouthB, foodB, "毛毛怪"));
    document.getElementById("newGameBtn").addEventListener("click", newGame);
    document.getElementById("resetGameBtn").addEventListener("click", () => {
      mouthA.innerHTML = "";
      mouthB.innerHTML = "";
      clearGameAnswerMarks();
      renderFruitPool();
      updateGameResult();
    });
    document.getElementById("speakGameBtn").addEventListener("click", () => {
      speakText(`大眼怪要食 ${targetA} 個，毛毛怪要食 ${targetB} 個。邊一隻食多啲？`);
    });
    newGame();

    const compareList = document.getElementById("compareList");
    const compareScore = document.getElementById("compareScore");
    let compareQuestions = [];

    const buildCompare = () => {
      const icons = ["🍎", "⭐", "🐟", "🌸", "🚗", "○", "□", "△"];
      compareQuestions = Array.from({ length: 10 }, (_, index) => {
        let left = randInt(42, 92);
        let right = randInt(42, 92);
        if (Math.abs(left - right) < 18) {
          if (left >= right) left += 14;
          else right += 14;
        }
        return {
          index,
          icon: icons[randInt(0, icons.length - 1)],
          left,
          right,
          answer: left === right ? "=" : left > right ? ">" : "<",
          picked: ""
        };
      });
    };

    const renderCompare = () => {
      compareList.innerHTML = "";
      compareQuestions.forEach(q => {
        const card = document.createElement("div");
        card.className = "compare-card";
        card.dataset.index = q.index;

        const left = document.createElement("div");
        left.className = "compare-side";
        left.innerHTML = `<span style="font-size:${q.left}px">${q.icon}</span>`;

        const ops = document.createElement("div");
        ops.className = "compare-ops";
        [">", "<", "="].forEach(symbol => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "symbol-btn";
          btn.textContent = symbol;
          if (q.picked === symbol) btn.classList.add("active");
          btn.addEventListener("click", () => {
            q.picked = symbol;
            renderCompare();
          });
          ops.appendChild(btn);
        });

        const right = document.createElement("div");
        right.className = "compare-side";
        right.innerHTML = `<span style="font-size:${q.right}px">${q.icon}</span>`;

        if (compareScore.dataset.checked === "true") {
          card.classList.add(q.picked === q.answer ? "correct" : "wrong");
        }

        card.append(left, ops, right);
        compareList.appendChild(card);
      });
    };

    const newCompare = () => {
      compareScore.dataset.checked = "false";
      compareScore.textContent = "完成 10 題後交卷。";
      buildCompare();
      renderCompare();
    };

    document.getElementById("checkCompareBtn").addEventListener("click", () => {
      const correct = compareQuestions.reduce((sum, q) => sum + (q.picked === q.answer ? 1 : 0), 0);
      compareScore.dataset.checked = "true";
      compareScore.textContent = `你答啱 ${correct} / 10 題`;
      renderCompare();
    });

    document.getElementById("newCompareBtn").addEventListener("click", newCompare);
    newCompare();
  </script>
</body>
</html>
